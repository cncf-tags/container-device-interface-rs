cdiVersion: "1.1.0"
kind: "vendor.com/device"
containerEdits:
  intelRdt:
    closID: "class-a"
    schemata:
      - "L3:0=ffff"
    enableMonitoring: true
  netDevices:
    - hostInterfaceName: "eth0"
      name: "container_eth0"
devices:
  - name: "gpu0"
    containerEdits:
      deviceNodes:
        - path: "/dev/null"
          type: "c"
          major: 1
          minor: 3
