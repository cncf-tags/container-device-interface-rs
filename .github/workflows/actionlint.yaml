name: Lint GHA workflows

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Detect if workflows changed
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            workflows:
              - '.github/workflows/**'

  run-actionlint:
    needs: changes
    if: ${{ needs.changes.outputs.workflows == 'true' }}
    env:
      GH_TOKEN: ${{ github.token }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout the code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install actionlint gh extension
        # Pinned: an unpinned install executes whatever is on the extension's
        # default branch at runtime.
        run: gh extension install https://github.com/cschleiden/gh-actionlint --pin 2282dce14a830e8ec7d23f5e0aba9b495b77f771 # v1.0.3

      - name: Run actionlint
        run: gh actionlint
